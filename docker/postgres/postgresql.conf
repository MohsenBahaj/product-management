# =============================================================================
# PostgreSQL 17 — Development configuration override
# Mounted at: /etc/postgresql/postgresql.conf
# =============================================================================

# Connection
listen_addresses = '*'
max_connections = 100

# Memory (tune for local dev — low values to save RAM)
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

# Logging (verbose for development)
# log_statement = 'all'
log_statement = 'none'

log_duration = on
log_min_duration_statement = 100   # log queries slower than 100ms

# Timezone
timezone = 'UTC'
log_timezone = 'UTC'

# Locale
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
