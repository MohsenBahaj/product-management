name: mobile
description: "StockFlow Mobile Management"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  easy_localization: ^3.0.7
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.0.0
  go_router: ^14.0.0
  get_it: ^8.0.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.0
  equatable: ^2.0.5
  image_picker: ^1.2.1
  native_splash_screen: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: 10.0.0
  mocktail: ^1.0.3
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/translations/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
flutter_native_splash:
  color: "#f7f7f7"
  image: assets/icons/logo.png

  android_12:
    color: "#f7f7f7"
    image: assets/icons/logo.png
    icon_background_color: "#f7f7f7" # Optional: matches splash background

  android: true
  ios: true
  web: false
