version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 17
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: product_management_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: product_management_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_management_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ---------------------------------------------------------------------------
  # Backend API (Node.js + Express)
  # Uncomment once backend implementation is ready
  # ---------------------------------------------------------------------------
  # api:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: product_management_api
  #   restart: unless-stopped
  #   env_file: ./backend/.env
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend/uploads:/app/uploads
  #   networks:
  #     - app_network

volumes:
  postgres_data:
    driver: local

networks:
  app_network:
    driver: bridge
